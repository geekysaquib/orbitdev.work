document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"position:absolute;top:-6px;left:50%;display:block;transform:translateX(-50%) scaleX(0.2198)\">\n              <span style=\"display:block;width:12px;height:12px;border-radius:50%;background:#37DFA0;box-shadow:0 0 14px 2px #37DFA0,0 0 4px #eafff6\"><\/span>\n            <\/span>\n          <\/span>\n        <\/span>\n      <\/h1>\n      <p style=\"max-width:560px;margin:22px auto 0;font-size:17px;line-height:1.6;color:#8B92A0;animation:up .5s .1s both\">ORBIT is the mission control for developers running many projects at once. Git, containers, editors, tickets, mail, and time — booted in one command, tracked without thinking.<\/p>\n      <div style=\"display:flex;align-items:center;justify-content:center;gap:12px;margin-top:32px;animation:up .5s .15s both\">\n        <a href=\"/app\" style=\"display:flex;align-items:center;gap:8px;height:46px;padding:0 22px;border-radius:11px;background:#37DFA0;color:#06110D;font-weight:600;font-size:15px\" style-hover=\"color:#06110D;background:#5cebb8\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M13 2 3 14h7l-1 8 10-12h-7z\"><\/path><\/svg>Start Work free<\/a>\n        <a href=\"#features\" style=\"display:flex;align-items:center;gap:8px;height:46px;padding:0 20px;border-radius:11px;border:1px solid rgba(255,255,255,.12);color:#ECEEF2;font-weight:500;font-size:15px\" style-hover=\"color:#ECEEF2;border-color:rgba(255,255,255,.24)\">See how it works<\/a>\n      <\/div>\n      <div style=\"font-family:'Google Sans',monospace;font-size:12px;color:#565C68;margin-top:18px;animation:up .5s .2s both\">macOS · Windows · Linux — local agent, your machine, your data<\/div>\n\n      <!-- PRODUCT WINDOW -->\n      <div style=\"position:relative;max-width:1000px;margin:56px auto -1px;border:1px solid rgba(255,255,255,.09);border-top-left-radius:16px;border-top-right-radius:16px;background:#0C0E11;box-shadow:0 -0 0 1px rgba(255,255,255,.02),0 40px 120px -40px #37DFA033;overflow:hidden;animation:up .6s .25s both\">\n        <div style=\"height:40px;display:flex;align-items:center;gap:8px;padding:0 16px;border-bottom:1px solid rgba(255,255,255,.06)\">\n          <span style=\"width:11px;height:11px;border-radius:50%;background:#2b3038\"><\/span><span style=\"width:11px;height:11px;border-radius:50%;background:#2b3038\"><\/span><span style=\"width:11px;height:11px;border-radius:50%;background:#2b3038\"><\/span>\n          <span style=\"font-family:'Google Sans',monospace;font-size:11px;color:#565C68;margin-left:12px\">orbit — dashboard<\/span>\n          <span style=\"margin-left:auto;display:flex;align-items:center;gap:7px;font-size:11px;color:#37DFA0;font-family:'Google Sans',monospace\"><span style=\"width:6px;height:6px;border-radius:50%;background:#37DFA0;box-shadow:0 0 6px #37DFA0\"><\/span>agent connected<\/span>\n        <\/div>\n        <div style=\"display:flex;text-align:left\">\n          <div style=\"width:52px;flex-shrink:0;border-right:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column;align-items:center;padding:14px 0;gap:16px\">\n            <span style=\"color:#37DFA0\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><rect x=\"3\" y=\"3\" width=\"7\" height=\"7\" rx=\"1.5\"><\/rect><rect x=\"14\" y=\"3\" width=\"7\" height=\"7\" rx=\"1.5\"><\/rect><rect x=\"14\" y=\"14\" width=\"7\" height=\"7\" rx=\"1.5\"><\/rect><rect x=\"3\" y=\"14\" width=\"7\" height=\"7\" rx=\"1.5\"><\/rect><\/svg><\/span>\n            <span style=\"color:#3a4150\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><path d=\"M12 2 3 7v10l9 5 9-5V7z\"><\/path><\/svg><\/span>\n            <span style=\"color:#3a4150\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><path d=\"M4 8a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v2a2 2 0 0 0 0 4v2a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-2a2 2 0 0 0 0-4z\"><\/path><\/svg><\/span>\n            <span style=\"color:#3a4150\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><path d=\"M13 2 3 14h7l-1 8 10-12h-7z\"><\/path><\/svg><\/span>\n          <\/div>\n          <div style=\"flex:1;padding:20px 22px;min-width:0\">\n            <div style=\"font-family:'Google Sans',sans-serif;font-size:18px;font-weight:700;letter-spacing:-.3px\">Good morning, Alex<\/div>\n            <div style=\"font-size:12px;color:#565C68;margin-top:3px\">6 projects tracked · 5 open tickets · 2 need attention<\/div>\n            <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:16px\">\n              <sc-for list=\"{{ heroBays }}\" as=\"b\" hint-placeholder-count=\"6\">\n                <div style=\"background:#0A0B0D;border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:13px 14px;position:relative;overflow:hidden\">\n                  <span style=\"position:absolute;top:0;left:14px;width:22px;height:2px;border-radius:2px;{{ b.tickStyle }}\"><\/span>\n                  <div style=\"display:flex;align-items:center;gap:7px\"><span style=\"font-family:'Google Sans',sans-serif;font-weight:600;font-size:13.5px\">{{ b.name }}<\/span><sc-if value=\"{{ b.live }}\"><span style=\"width:5px;height:5px;border-radius:50%;{{ b.dotStyle }};animation:pulse 2.6s infinite\"><\/span><\/sc-if><\/div>\n                  <div style=\"font-family:'Google Sans',monospace;font-size:10px;color:#8B92A0;margin-top:9px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ b.branch }}<\/div>\n                  <div style=\"font-family:'Google Sans',monospace;font-size:10px;{{ b.dockerStyle }};margin-top:5px\">{{ b.docker }}<\/div>\n                <\/div>\n              <\/sc-for>\n            <\/div>\n          <\/div>\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/header>\n\n  <!-- STAT BAND -->\n  <section style=\"border-bottom:1px solid rgba(255,255,255,.06);background:#0C0E11\">\n    <div style=\"max-width:1180px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);padding:0 28px\">\n      <sc-for list=\"{{ stats }}\" as=\"s\" hint-placeholder-count=\"4\">\n        <div style=\"padding:30px 24px;{{ s.divider }}\">\n          <div style=\"font-family:'Google Sans',sans-serif;font-size:34px;font-weight:700;letter-spacing:-1px;{{ s.valueStyle }}\">{{ s.value }}<\/div>\n          <div style=\"font-size:13px;color:#8B92A0;margin-top:6px;line-height:1.4\">{{ s.label }}<\/div>\n        <\/div>\n      <\/sc-for>\n    <\/div>\n  <\/section>\n\n  <!-- ORBIT SYSTEM -->\n  <section id=\"system\" style=\"max-width:1180px;margin:0 auto;padding:104px 28px 0\">\n    <div style=\"display:grid;grid-template-columns:1fr 600px;gap:32px;align-items:center\">\n      <div>\n        <div style=\"font-family:'Google Sans',monospace;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#37DFA0\">The system<\/div>\n        <h2 style=\"font-family:'Google Sans',sans-serif;font-size:42px;font-weight:700;letter-spacing:-1.2px;margin-top:14px;line-height:1.08\">Everything revolves<br>around one command<\/h2>\n        <p style=\"font-size:16px;color:#8B92A0;line-height:1.65;margin-top:18px;max-width:400px\">Your projects don't live in scattered terminals and browser tabs anymore. They orbit a single hub — always in view, always one click from launch.<\/p>\n        <div style=\"display:flex;flex-direction:column;gap:11px;margin-top:26px\">\n          <sc-for list=\"{{ orbitLegend }}\" as=\"l\" hint-placeholder-count=\"3\">\n            <div style=\"display:flex;align-items:center;gap:11px;font-size:14px\"><span style=\"width:9px;height:9px;border-radius:50%;flex-shrink:0;{{ l.dotStyle }}\"><\/span><span style=\"color:#c3ccdb\">{{ l.label }}<\/span><\/div>\n          <\/sc-for>\n        <\/div>\n      <\/div>\n      <div style=\"position:relative;width:600px;height:600px;margin:0 auto\">\n        <div style=\"position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:440px;height:440px;border-radius:50%;background:radial-gradient(circle,#37DFA016,transparent 68%);pointer-events:none\"><\/div>\n        <sc-for list=\"{{ orbitOutlines }}\" as=\"o\" hint-placeholder-count=\"2\"><div style=\"{{ o.style }}\"><\/div><\/sc-for>\n        <sc-for list=\"{{ orbitNodes }}\" as=\"n\" hint-placeholder-count=\"6\">\n          <div style=\"{{ n.trackStyle }}\">\n            <div style=\"position:absolute;top:-15px;left:50%;transform:translateX(-50%)\">\n              <div style=\"{{ n.spinStyle }}\">\n                <div style=\"display:flex;align-items:center;gap:8px;padding:7px 14px;background:#0C0E11;border:1px solid rgba(255,255,255,.11);border-radius:100px;box-shadow:0 8px 24px -10px rgba(0,0,0,.8);white-space:nowrap\">\n                  <span style=\"{{ n.dotStyle }}\"><\/span>\n                  <span style=\"font-family:'Google Sans',sans-serif;font-weight:600;font-size:13px\">{{ n.name }}<\/span>\n                <\/div>\n              <\/div>\n            <\/div>\n          <\/div>\n        <\/sc-for>\n        <div style=\"position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:120px;height:120px;border-radius:50%;background:radial-gradient(circle at 50% 38%,#12211b,#0A0B0D);border:1px solid #37DFA055;display:grid;place-items:center;box-shadow:0 0 46px -6px #37DFA05e,inset 0 0 22px #37DFA01f;animation:float 5s ease-in-out infinite\">\n          <div style=\"text-align:center\">\n            <span style=\"color:#37DFA0;display:inline-flex\"><svg width=\"30\" height=\"30\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\"><circle cx=\"12\" cy=\"12\" r=\"3.1\"><\/circle><ellipse cx=\"12\" cy=\"12\" rx=\"10\" ry=\"4.3\" transform=\"rotate(-26 12 12)\"><\/ellipse><\/svg><\/span>\n            <div style=\"font-family:'Google Sans',sans-serif;font-weight:700;font-size:11px;letter-spacing:2.5px;margin-top:2px;color:#ECEEF2\">ORBIT<\/div>\n          <\/div>\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/section>\n\n  <!-- FEATURES -->\n  <section id=\"features\" style=\"max-width:1180px;margin:0 auto;padding:96px 28px 0\">\n    <div style=\"text-align:center;max-width:620px;margin:0 auto\">\n      <div style=\"font-family:'Google Sans',monospace;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#37DFA0\">The workspace<\/div>\n      <h2 style=\"font-family:'Google Sans',sans-serif;font-size:40px;font-weight:700;letter-spacing:-1px;margin-top:14px;line-height:1.1\">Stop assembling your environment by hand<\/h2>\n      <p style=\"font-size:16px;color:#8B92A0;margin-top:16px;line-height:1.6\">Your repos, tickets, containers, and mail in one place. ORBIT holds the state so you don't have to.<\/p>\n    <\/div>\n    <div style=\"display:grid;grid-template-columns:1.4fr 1fr;gap:16px;margin-top:52px\">\n      <!-- big: project bays -->\n      <div style=\"grid-row:span 2;background:#0C0E11;border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:30px;display:flex;flex-direction:column\">\n        <div style=\"display:flex;align-items:center;gap:10px;color:#37DFA0\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><rect x=\"3\" y=\"3\" width=\"7\" height=\"7\" rx=\"1.5\"><\/rect><rect x=\"14\" y=\"3\" width=\"7\" height=\"7\" rx=\"1.5\"><\/rect><rect x=\"14\" y=\"14\" width=\"7\" height=\"7\" rx=\"1.5\"><\/rect><rect x=\"3\" y=\"14\" width=\"7\" height=\"7\" rx=\"1.5\"><\/rect><\/svg><span style=\"font-family:'Google Sans',monospace;font-size:12px;letter-spacing:1px;color:#8B92A0\">PROJECT BAYS<\/span><\/div>\n        <h3 style=\"font-family:'Google Sans',sans-serif;font-size:24px;font-weight:650;letter-spacing:-.4px;margin-top:16px\">Every repo at a glance<\/h3>\n        <p style=\"font-size:14.5px;color:#8B92A0;line-height:1.6;margin-top:10px\">Live git branch, uncommitted count, container state, and last commit — for all your projects, without opening a single terminal.<\/p>\n        <div style=\"margin-top:auto;padding-top:24px;display:flex;flex-direction:column;gap:9px\">\n          <sc-for list=\"{{ featBays }}\" as=\"b\" hint-placeholder-count=\"3\">\n            <div style=\"display:flex;align-items:center;gap:12px;padding:13px 15px;background:#0A0B0D;border:1px solid rgba(255,255,255,.06);border-radius:11px\">\n              <span style=\"width:8px;height:8px;border-radius:3px;flex-shrink:0;{{ b.tickStyle }}\"><\/span>\n              <span style=\"font-family:'Google Sans',sans-serif;font-weight:600;font-size:14px;min-width:104px\">{{ b.name }}<\/span>\n              <span style=\"font-family:'Google Sans',monospace;font-size:11.5px;color:#8B92A0;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ b.branch }}<\/span>\n              <span style=\"font-family:'Google Sans',monospace;font-size:11px;{{ b.dockerStyle }};flex-shrink:0\">{{ b.docker }}<\/span>\n            <\/div>\n          <\/sc-for>\n        <\/div>\n      <\/div>\n      <!-- tickets -->\n      <div style=\"background:#0C0E11;border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:28px\">\n        <div style=\"display:flex;align-items:center;gap:10px;color:#E4A951\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><path d=\"M4 8a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v2a2 2 0 0 0 0 4v2a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-2a2 2 0 0 0 0-4z\"><\/path><path d=\"M13 6v12\"><\/path><\/svg><span style=\"font-family:'Google Sans',monospace;font-size:12px;letter-spacing:1px;color:#8B92A0\">TICKETS<\/span><\/div>\n        <h3 style=\"font-family:'Google Sans',sans-serif;font-size:22px;font-weight:650;letter-spacing:-.4px;margin-top:14px\">Tickets, where you work<\/h3>\n        <p style=\"font-size:14px;color:#8B92A0;line-height:1.55;margin-top:9px\">Assigned tickets sync in automatically. Branch and start from any of them in one click.<\/p>\n      <\/div>\n      <!-- time -->\n      <div style=\"background:#0C0E11;border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:28px\">\n        <div style=\"display:flex;align-items:center;gap:10px;color:#5B8DEF\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><circle cx=\"12\" cy=\"13\" r=\"8\"><\/circle><path d=\"M12 9v4l2 2\"><\/path><path d=\"M9 2h6\"><\/path><\/svg><span style=\"font-family:'Google Sans',monospace;font-size:12px;letter-spacing:1px;color:#8B92A0\">TIME<\/span><\/div>\n        <h3 style=\"font-family:'Google Sans',sans-serif;font-size:22px;font-weight:650;letter-spacing:-.4px;margin-top:14px\">Billable, tracked silently<\/h3>\n        <p style=\"font-size:14px;color:#8B92A0;line-height:1.55;margin-top:9px\">The timer starts when you do. Every session logged per project, per client — ready to invoice.<\/p>\n      <\/div>\n    <\/div>\n  <\/section>\n\n  <!-- IGNITION SIGNATURE -->\n  <section id=\"ignition\" style=\"max-width:1180px;margin:0 auto;padding:100px 28px 0\">\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:center\">\n      <div>\n        <div style=\"font-family:'Google Sans',monospace;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#37DFA0\">The signature move<\/div>\n        <h2 style=\"font-family:'Google Sans',sans-serif;font-size:42px;font-weight:700;letter-spacing:-1.2px;margin-top:14px;line-height:1.08\">One button boots<br>your whole day<\/h2>\n        <p style=\"font-size:16px;color:#8B92A0;line-height:1.65;margin-top:18px\">Hit <strong style=\"color:#ECEEF2;font-weight:600\">Start Work<\/strong> and ORBIT fetches your latest code, spins up containers, launches your editors, syncs tickets, and starts the clock — a full environment in the time it takes to grab coffee.<\/p>\n        <div style=\"display:flex;flex-direction:column;gap:14px;margin-top:26px\">\n          <sc-for list=\"{{ ignPoints }}\" as=\"p\" hint-placeholder-count=\"3\">\n            <div style=\"display:flex;align-items:flex-start;gap:12px\"><span style=\"color:#37DFA0;margin-top:1px;flex-shrink:0\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"><\/polyline><\/svg><\/span><span style=\"font-size:14.5px;color:#c3ccdb;line-height:1.5\">{{ p }}<\/span><\/div>\n          <\/sc-for>\n        <\/div>\n        <button onclick=\"{{ h.replay }}\" style=\"display:inline-flex;align-items:center;gap:8px;height:42px;padding:0 18px;border-radius:10px;background:#37DFA0;color:#06110D;font-weight:600;font-size:14px;margin-top:30px\" style-hover=\"background:#5cebb8\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M13 2 3 14h7l-1 8 10-12h-7z\"><\/path><\/svg>{{ replayLabel }}<\/button>\n      <\/div>\n      <!-- ignition console -->\n      <div style=\"background:#0C0E11;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:24px;box-shadow:0 40px 100px -50px #37DFA044\">\n        <div style=\"display:flex;align-items:center;gap:12px;padding-bottom:18px;border-bottom:1px solid rgba(255,255,255,.06)\">\n          <div style=\"width:38px;height:38px;border-radius:11px;display:grid;place-items:center;background:#37DFA0;color:#06110D\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M13 2 3 14h7l-1 8 10-12h-7z\"><\/path><\/svg><\/div>\n          <div><div style=\"font-family:'Google Sans',sans-serif;font-weight:700;font-size:15px\">Booting work session<\/div><div style=\"font-family:'Google Sans',monospace;font-size:11.5px;color:#8B92A0;margin-top:2px\">Helio · Meridian<\/div><\/div>\n          <span style=\"margin-left:auto;font-family:'Google Sans',monospace;font-size:12px;color:#37DFA0\">{{ ignPct }}<\/span>\n        <\/div>\n        <div style=\"height:2px;background:rgba(255,255,255,.06);border-radius:2px;margin:16px 0 18px;overflow:hidden\"><div style=\"height:100%;background:#37DFA0;border-radius:2px;transition:width .5s ease;{{ ignBar }}\"><\/div><\/div>\n        <div style=\"display:flex;flex-direction:column;gap:2px\">\n          <sc-for list=\"{{ ignSteps }}\" as=\"s\" hint-placeholder-count=\"7\">\n            <div style=\"display:flex;align-items:center;gap:12px;padding:9px 11px;border-radius:9px;font-size:13px;transition:.2s;{{ s.rowStyle }}\">\n              <span style=\"width:16px;height:16px;display:grid;place-items:center;flex-shrink:0\">\n                <sc-if value=\"{{ s.isDone }}\"><span style=\"color:#37DFA0\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"><\/polyline><\/svg><\/span><\/sc-if>\n                <sc-if value=\"{{ s.isActive }}\"><span style=\"width:13px;height:13px;border-radius:50%;border:2px solid #5B8DEF44;border-top-color:#5B8DEF;animation:spin .8s linear infinite\"><\/span><\/sc-if>\n                <sc-if value=\"{{ s.isPending }}\"><span style=\"width:5px;height:5px;border-radius:50%;background:#3a4150\"><\/span><\/sc-if>\n              <\/span>\n              <span style=\"font-family:'Google Sans',monospace;font-size:12.5px;{{ s.labelStyle }}\">{{ s.label }}<\/span>\n            <\/div>\n          <\/sc-for>\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/section>\n\n  <!-- COMMAND PALETTE -->\n  <section id=\"palette\" style=\"max-width:1180px;margin:0 auto;padding:100px 28px 0\">\n    <div style=\"display:grid;grid-template-columns:1fr 1.05fr;gap:56px;align-items:center\">\n      <div>\n        <div style=\"font-family:'Google Sans',monospace;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#37DFA0\">One keystroke<\/div>\n        <h2 style=\"font-family:'Google Sans',sans-serif;font-size:42px;font-weight:700;letter-spacing:-1.2px;margin-top:14px;line-height:1.06\">Everything, a<br><kbd style=\"font-family:'Google Sans',monospace;background:#16191F;border:1px solid rgba(255,255,255,.14);border-bottom-width:2px;padding:2px 12px;border-radius:9px;font-size:34px\">⌘K<\/kbd> away<\/h2>\n        <p style=\"font-size:16px;color:#8B92A0;line-height:1.65;margin-top:18px\">Jump to any project, launch an editor, branch a ticket, or spin up containers — without lifting your hands off the keyboard. Try it →<\/p>\n      <\/div>\n      <div style=\"background:#0F1319;border:1px solid rgba(255,255,255,.1);border-radius:14px;box-shadow:0 40px 100px -50px #37DFA044;overflow:hidden\">\n        <div style=\"display:flex;align-items:center;gap:11px;padding:15px 17px;border-bottom:1px solid rgba(255,255,255,.07)\">\n          <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#565C68\" stroke-width=\"2\" stroke-linecap=\"round\"><circle cx=\"11\" cy=\"11\" r=\"7\"><\/circle><path d=\"m21 21-4.3-4.3\"><\/path><\/svg>\n          <input value=\"{{ paletteQuery }}\" oninput=\"{{ h.onQuery }}\" placeholder=\"Type a command or project…\" style=\"flex:1;background:none;border:none;outline:none;color:#ECEEF2;font-size:15px\">\n          <kbd style=\"font-family:'Google Sans',monospace;font-size:11px;color:#565C68;border:1px solid rgba(255,255,255,.1);padding:2px 7px;border-radius:5px\">esc<\/kbd>\n        <\/div>\n        <div style=\"padding:8px;max-height:296px;overflow-y:auto\">\n          <sc-for list=\"{{ paletteResults }}\" as=\"r\" hint-placeholder-count=\"5\">\n            <div style=\"display:flex;align-items:center;gap:13px;padding:11px 12px;border-radius:9px;{{ r.rowStyle }}\">\n              <span style=\"width:30px;height:30px;border-radius:8px;display:grid;place-items:center;flex-shrink:0;{{ r.iconStyle }}\">{{ r.glyph }}<\/span>\n              <div style=\"flex:1;min-width:0\"><div style=\"font-size:13.5px;font-weight:500\">{{ r.title }}<\/div><div style=\"font-family:'Google Sans',monospace;font-size:11px;color:#565C68;margin-top:1px\">{{ r.cat }}<\/div><\/div>\n              <span style=\"{{ r.enterStyle }}\">↵<\/span>\n            <\/div>\n          <\/sc-for>\n          <sc-if value=\"{{ paletteNoResults }}\"><div style=\"padding:28px;text-align:center;color:#565C68;font-size:13px\">No matches for \"{{ paletteQuery }}\"<\/div><\/sc-if>\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/section>\n\n  <!-- AUTOMATION -->\n  <section id=\"automation\" style=\"max-width:1180px;margin:0 auto;padding:100px 28px 0\">\n    <div style=\"background:#0C0E11;border:1px solid rgba(255,255,255,.06);border-radius:20px;padding:52px 48px;position:relative;overflow:hidden\">\n      <div style=\"position:absolute;top:-80px;right:-40px;width:340px;height:340px;background:radial-gradient(circle,#A98BF522,transparent 70%);pointer-events:none\"><\/div>\n      <div style=\"position:relative;max-width:560px\">\n        <div style=\"font-family:'Google Sans',monospace;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#A98BF5\">Automation<\/div>\n        <h2 style=\"font-family:'Google Sans',sans-serif;font-size:38px;font-weight:700;letter-spacing:-1px;margin-top:14px;line-height:1.1\">It runs the busywork while you build<\/h2>\n        <p style=\"font-size:16px;color:#8B92A0;line-height:1.6;margin-top:14px\">When→Then rules, scheduled jobs, and scaffold templates keep tickets moving, backups running, and new modules minted — without a context switch.<\/p>\n      <\/div>\n      <div style=\"position:relative;display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:36px\">\n        <sc-for list=\"{{ rules }}\" as=\"r\" hint-placeholder-count=\"3\">\n          <div style=\"background:#0A0B0D;border:1px solid rgba(255,255,255,.06);border-radius:13px;padding:20px\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between\"><span style=\"font-family:'Google Sans',monospace;font-size:10.5px;letter-spacing:1px;color:#565C68\">RULE<\/span><span style=\"width:32px;height:19px;border-radius:11px;background:#37DFA0;position:relative\"><span style=\"position:absolute;top:2px;right:2px;width:15px;height:15px;border-radius:50%;background:#06110D\"><\/span><\/span><\/div>\n            <div style=\"font-size:13.5px;margin-top:14px;line-height:1.5\"><span style=\"color:#8B92A0\">When<\/span> {{ r.when }}<\/div>\n            <div style=\"font-size:13.5px;margin-top:7px;line-height:1.5\"><span style=\"color:#8B92A0\">Then<\/span> {{ r.then }}<\/div>\n          <\/div>\n        <\/sc-for>\n      <\/div>\n    <\/div>\n  <\/section>\n\n  <!-- A DAY IN ORBIT -->\n  <section id=\"day\" style=\"max-width:1180px;margin:0 auto;padding:100px 28px 0\">\n    <div style=\"background:#0C0E11;border:1px solid rgba(255,255,255,.06);border-radius:20px;padding:56px 48px\">\n      <div style=\"text-align:center;max-width:600px;margin:0 auto\">\n        <div style=\"font-family:'Google Sans',monospace;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#5B8DEF\">A day in orbit<\/div>\n        <h2 style=\"font-family:'Google Sans',sans-serif;font-size:38px;font-weight:700;letter-spacing:-1px;margin-top:14px;line-height:1.1\">From coffee to commit,<br>it keeps pace with you<\/h2>\n      <\/div>\n      <div style=\"position:relative;margin-top:48px\">\n        <div style=\"position:absolute;top:19px;left:9%;right:9%;height:2px;background:linear-gradient(90deg,#37DFA0,#5B8DEF,#A98BF5)\"><\/div>\n        <div style=\"position:relative;display:grid;grid-template-columns:repeat(5,1fr);gap:16px\">\n          <sc-for list=\"{{ timeline }}\" as=\"t\" hint-placeholder-count=\"5\">\n            <div style=\"text-align:center;padding:0 6px\">\n              <div style=\"width:40px;height:40px;border-radius:50%;margin:0 auto;display:grid;place-items:center;background:#0C0E11;border:2px solid {{ t.color }};color:{{ t.color }}\">{{ t.glyph }}<\/div>\n              <div style=\"font-family:'Google Sans',monospace;font-size:12px;color:{{ t.color }};margin-top:14px;font-weight:500\">{{ t.time }}<\/div>\n              <div style=\"font-family:'Google Sans',sans-serif;font-weight:600;font-size:14.5px;margin-top:6px\">{{ t.title }}<\/div>\n              <div style=\"font-size:12.5px;color:#8B92A0;margin-top:5px;line-height:1.45\">{{ t.desc }}<\/div>\n            <\/div>\n          <\/sc-for>\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/section>\n\n  <!-- CTA -->\n  <section id=\"cta\" style=\"max-width:1180px;margin:0 auto;padding:110px 28px 100px;text-align:center\">\n    <div style=\"display:inline-flex;color:#37DFA0;animation:float 4s ease-in-out infinite\"><svg width=\"44\" height=\"44\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\"><circle cx=\"12\" cy=\"12\" r=\"3.1\"><\/circle><ellipse cx=\"12\" cy=\"12\" rx=\"10\" ry=\"4.3\" transform=\"rotate(-26 12 12)\"><\/ellipse><\/svg><\/div>\n    <h2 style=\"font-family:'Google Sans',sans-serif;font-size:48px;font-weight:700;letter-spacing:-1.4px;margin-top:22px;line-height:1.05\">Your cockpit is waiting<\/h2>\n    <p style=\"max-width:500px;margin:18px auto 0;font-size:17px;color:#8B92A0;line-height:1.6\">Install the local agent, register your projects, and hit Start Work. The rest happens on its own.<\/p>\n    <div style=\"display:flex;align-items:center;justify-content:center;gap:12px;margin-top:32px\">\n      <a href=\"/app\" style=\"display:flex;align-items:center;gap:8px;height:48px;padding:0 24px;border-radius:11px;background:#37DFA0;color:#06110D;font-weight:600;font-size:15px\" style-hover=\"color:#06110D;background:#5cebb8\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M13 2 3 14h7l-1 8 10-12h-7z\"><\/path><\/svg>Get ORBIT free<\/a>\n      <a href=\"/docs\" style=\"display:flex;align-items:center;gap:8px;height:48px;padding:0 22px;border-radius:11px;border:1px solid rgba(255,255,255,.12);color:#ECEEF2;font-weight:500;font-size:15px\" style-hover=\"color:#ECEEF2;border-color:rgba(255,255,255,.24)\">Read the docs<\/a>\n    <\/div>\n    <div style=\"font-family:'Google Sans',monospace;font-size:12px;color:#565C68;margin-top:20px\">Free for solo use · your code never leaves your machine<\/div>\n  <\/section>\n\n  <!-- FOOTER -->\n  <footer style=\"border-top:1px solid rgba(255,255,255,.06);background:#0C0E11\">\n    <div style=\"max-width:1180px;margin:0 auto;padding:34px 28px;display:flex;align-items:center;gap:14px;flex-wrap:wrap\">\n      <span style=\"color:#37DFA0;display:flex\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\"><circle cx=\"12\" cy=\"12\" r=\"3.1\"><\/circle><ellipse cx=\"12\" cy=\"12\" rx=\"10\" ry=\"4.3\" transform=\"rotate(-26 12 12)\"><\/ellipse><\/svg><\/span>\n      <span style=\"font-family:'Google Sans',sans-serif;font-weight:700;font-size:15px;letter-spacing:2px\">ORBIT<\/span>\n      <span style=\"font-family:'Google Sans',monospace;font-size:11px;color:#565C68\">v0.1<\/span>\n      <div style=\"flex:1\"><\/div>\n      <div style=\"display:flex;gap:24px;font-size:13px;color:#8B92A0\">\n        <a href=\"#features\" style=\"color:#8B92A0\" style-hover=\"color:#ECEEF2\">Features<\/a>\n        <a href=\"#\" style=\"color:#8B92A0\" style-hover=\"color:#ECEEF2\">Docs<\/a>\n        <a href=\"#\" style=\"color:#8B92A0\" style-hover=\"color:#ECEEF2\">Changelog<\/a>\n        <a href=\"#\" style=\"color:#8B92A0\" style-hover=\"color:#ECEEF2\">GitHub<\/a>\n      <\/div>\n      <span style=\"font-size:12.5px;color:#565C68;width:100%;text-align:left;margin-top:6px\">© 2026 ORBIT — built for operators who ship.<\/span>\n    <\/div>\n  <\/footer>\n\n<\/div>\n<\/x-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1180,&quot;height&quot;:900},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#37DFA0&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#37DFA0&quot;,&quot;#5B8DEF&quot;,&quot;#E4A951&quot;,&quot;#A98BF5&quot;]}}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.state = { igStep:7, playing:false, palette:'' };\n    this._iv=null;\n    this.IG=['git fetch && rebase','docker compose up','Postgres + dev server','VS Code — frontend','Visual Studio — backend','ticket sync — 3 loaded','Timer started · logging on'];\n  }\n  componentWillUnmount(){ clearInterval(this._iv); }\n  replay(){\n    clearInterval(this._iv);\n    this.setState({igStep:0,playing:true});\n    this._iv=setInterval(()=>{\n      this.setState(s=>{\n        const n=s.igStep+1;\n        if(n>=this.IG.length){ clearInterval(this._iv); return {igStep:this.IG.length,playing:false}; }\n        return {igStep:n};\n      });\n    },560);\n  }\n  renderVals(){\n    const MINT=this.props.accent ?? '#37DFA0';\n    const st=this.state;\n    const P={mint:MINT,blue:'#5B8DEF',violet:'#A98BF5'};\n\n    const baysData=[\n      {name:'Helio',accent:MINT,branch:'feature/checkout-rca · 4',docker:'containers up',up:true,live:true},\n      {name:'Atlas',accent:MINT,branch:'main',docker:'containers up',up:true,live:true},\n      {name:'Beacon',accent:P.blue,branch:'settings-smtp · 11',docker:'containers off',up:false,live:true},\n      {name:'Relay',accent:P.blue,branch:'socket-reconnect · 2',docker:'containers off',up:false,live:true},\n      {name:'Pulse',accent:P.blue,branch:'main',docker:'containers off',up:false,live:true},\n      {name:'Nova',accent:P.violet,branch:'stage-2-tools',docker:'on hold',up:false,live:false},\n    ];\n    const mapBay=b=>({\n      name:b.name, branch:b.branch, docker:b.docker, live:b.live,\n      tickStyle:'background:'+b.accent,\n      dotStyle:'background:'+b.accent+';box-shadow:0 0 6px '+b.accent,\n      dockerStyle:'color:'+(b.up?MINT:'#565C68'),\n    });\n    const heroBays=baysData.map(mapBay);\n    const featBays=[baysData[0],baysData[2],baysData[5]].map(mapBay);\n\n    const stats=[\n      {value:'6',label:'projects in orbit, tracked live',vc:'#ECEEF2',first:true},\n      {value:'1',label:'command to boot your day',vc:MINT},\n      {value:'~40s',label:'from click to full environment',vc:P.blue},\n      {value:'0',label:'lines of your code leave the box',vc:P.violet},\n    ].map((s,i)=>({value:s.value,label:s.label,valueStyle:'color:'+s.vc,divider:i===0?'':'border-left:1px solid rgba(255,255,255,.06)'}));\n\n    const ignPoints=[\n      'Latest code pulled and rebased across every active repo',\n      'Containers, databases, and dev servers up and healthy',\n      'Editors open, tickets synced, timer running — automatically',\n    ];\n    const ignSteps=this.IG.map((label,i)=>({\n      label, isDone:i<st.igStep, isActive:i===st.igStep, isPending:i>st.igStep,\n      rowStyle:i===st.igStep?'background:#101216':'',\n      labelStyle:'color:'+(i>st.igStep?'#565C68':'#ECEEF2'),\n    }));\n    const pct=Math.min(100,Math.round(st.igStep/this.IG.length*100));\n\n    const rules=[\n      {when:'a ticket is assigned to me',then:'notify + create a task'},\n      {when:'a branch is pushed with a ticket id',then:'set ticket → In progress'},\n      {when:'a pull request is merged',then:'move the linked task to Done'},\n    ];\n\n    const AMBER='#E4A951';\n    const q=st.palette.trim().toLowerCase();\n    const cmds=[\n      {glyph:'⚡',title:'Start Work — Helio',cat:'session',c:MINT},\n      {glyph:'‹›',title:'Open Atlas in editor',cat:'project · editor',c:P.blue},\n      {glyph:'⎇',title:'Branch ticket #4102 — checkout RCA',cat:'ticket · git',c:AMBER},\n      {glyph:'▤',title:'docker compose up — Beacon',cat:'containers',c:P.blue},\n      {glyph:'＋',title:'New project…',cat:'workspace',c:MINT},\n      {glyph:'◷',title:'Stop timer — 2h 14m logged',cat:'time',c:P.violet},\n      {glyph:'⤢',title:'Sync tickets now',cat:'automation',c:AMBER},\n    ];\n    const pf=q?cmds.filter(c=>c.title.toLowerCase().includes(q)||c.cat.toLowerCase().includes(q)):cmds;\n    const paletteResults=pf.map((c,i)=>({\n      glyph:c.glyph, title:c.title, cat:c.cat,\n      iconStyle:'background:'+c.c+'1a;color:'+c.c+';font-size:15px',\n      rowStyle:i===0?'background:#16191F':'',\n      enterStyle:'font-family:\\'Google Sans\\',monospace;font-size:13px;color:'+(i===0?'#8B92A0':'transparent'),\n    }));\n\n    const timeline=[\n      {time:'08:45',title:'Tickets sync',desc:'Overnight assignments land as tasks',color:AMBER,glyph:'⤢'},\n      {time:'09:00',title:'Start Work',desc:'One click boots the whole environment',color:MINT,glyph:'⚡'},\n      {time:'09:04',title:'In flow',desc:'Editors open, containers healthy, timer on',color:MINT,glyph:'‹›'},\n      {time:'13:20',title:'PR merged',desc:'Linked task auto-moves to Done',color:P.blue,glyph:'⎇'},\n      {time:'18:00',title:'Wind down',desc:'Timer stops, standup drafts itself',color:P.violet,glyph:'◷'},\n    ];\n\n    // ORBIT SYSTEM — revolving rings\n    const projColor={Helio:MINT,Beacon:P.blue,Pulse:P.blue,Atlas:MINT,Relay:P.blue,Nova:P.violet};\n    const ringDefs=[\n      {size:300,dur:34,reverse:false,items:['Helio','Beacon','Pulse']},\n      {size:500,dur:54,reverse:true,items:['Atlas','Relay','Nova']},\n    ];\n    const orbitOutlines=ringDefs.map(r=>({\n      style:'position:absolute;top:50%;left:50%;width:'+r.size+'px;height:'+r.size+'px;margin:'+(-r.size/2)+'px 0 0 '+(-r.size/2)+'px;border:1px solid rgba(255,255,255,.06);border-radius:50%',\n    }));\n    let orbitNodes=[];\n    ringDefs.forEach(r=>{\n      const n=r.items.length;\n      const trackDir=r.reverse?'reverse':'normal';\n      const spinDir=r.reverse?'normal':'reverse';\n      r.items.forEach((name,i)=>{\n        const delay=(-(i/n)*r.dur).toFixed(2);\n        const c=projColor[name]||MINT;\n        orbitNodes.push({\n          name,\n          dotStyle:'width:8px;height:8px;border-radius:50%;background:'+c+';box-shadow:0 0 8px '+c,\n          trackStyle:'position:absolute;top:50%;left:50%;width:'+r.size+'px;height:'+r.size+'px;margin:'+(-r.size/2)+'px 0 0 '+(-r.size/2)+'px;animation:spin '+r.dur+'s linear infinite '+trackDir+';animation-delay:'+delay+'s',\n          spinStyle:'animation:spin '+r.dur+'s linear infinite '+spinDir+';animation-delay:'+delay+'s',\n        });\n      });\n    });\n    const orbitLegend=[\n      {label:'Client work — Helio, Atlas',dotStyle:'background:'+MINT+';box-shadow:0 0 8px '+MINT},\n      {label:'Personal builds — Beacon, Relay, Pulse',dotStyle:'background:'+P.blue},\n      {label:'On hold — Nova',dotStyle:'background:'+P.violet},\n    ];\n\n    return {\n      heroBays, featBays, stats, ignPoints, ignSteps, rules,\n      orbitOutlines, orbitNodes, orbitLegend,\n      paletteQuery:st.palette, paletteResults, paletteNoResults:paletteResults.length===0, timeline,\n      ignPct:pct+'%', ignBar:'width:'+pct+'%',\n      replayLabel: st.playing?'Booting…':'Replay ignition',\n      h:{ replay:()=>this.replay(), onQuery:(e)=>this.setState({palette:e.target.value}) },\n    };\n  }\n}\n<\/script>\n\n\n<\/body><\/html>"</script>
